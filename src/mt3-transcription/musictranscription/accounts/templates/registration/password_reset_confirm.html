<!DOCTYPE html>
<html>
<head>
    <title>Password Reset Confirm</title>
</head>
<body>
    <h1>Reset Your Password</h1>
    <form method="post" action="{% url 'password_reset_confirm' uidb64=uid token=token %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset Password</button>
    </form>
</body>
</html>
