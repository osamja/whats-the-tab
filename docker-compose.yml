services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whats-the-tab-web
    command: sh -c "uv run python manage.py migrate && uv run gunicorn --bind 0.0.0.0:8008 --timeout 300 musictranscription.wsgi"
    ports:
      - "8008:8008"
    environment:
      DEBUG: "False"
      USE_PYTORCH: "True"
      IS_ASYNC: "False"
    volumes:
      - ./audios:/app/audios
      - ./midi:/app/midi
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    container_name: whats-the-tab-redis
    ports:
      - "6379:6379"
