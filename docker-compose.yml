services:
  postgres:
    image: postgres:15-alpine
    container_name: whats-the-tab-postgres
    environment:
      POSTGRES_DB: whatsthetab
      POSTGRES_USER: whatsthetab
      POSTGRES_PASSWORD: whatsthetab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsthetab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whats-the-tab-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: whats-the-tab-web
    ports:
      - "8008:8008"
    environment:
      DEBUG: "False"
      SECRET_KEY: "dev-key-change-in-production"
      DATABASE_URL: "postgres://whatsthetab:whatsthetab@postgres:5432/whatsthetab"
      REDIS_URL: "redis://redis:6379"
      WEB_URL: "http://web:8008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whats-the-tab-worker
    environment:
      DEBUG: "False"
      SECRET_KEY: "dev-key-change-in-production"
      REDIS_URL: "redis://redis:6379"
      WEB_URL: "http://web:8008"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
